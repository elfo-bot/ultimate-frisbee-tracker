<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Ultimate Frisbee Tracker Pro</title>
<style>
:root {
--bg: #0f172a; --surface: #1e293b; --surface2: #334155;
--border: #475569; --text: #f1f5f9; --muted: #94a3b8;
--accent: #38bdf8; --green: #22c55e; --red: #ef4444; --amber: #f59e0b;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; }
nav { background: var(--surface); border-bottom: 1px solid var(--border); padding: 12px 20px; display: flex; align-items: center; gap: 12px; }
.logo { font-weight: 700; font-size: 1.1rem; color: var(--accent); }
.screen { display: none; padding: 20px; max-width: 480px; margin: 0 auto; }
.screen.active { display: block; }
.card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 16px; margin-bottom: 14px; }
.card-title { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); margin-bottom: 10px; }
.btn { display: inline-flex; align-items: center; justify-content: center; gap: 6px; padding: 10px 18px; border-radius: 8px; font-size: 0.9rem; font-weight: 600; cursor: pointer; border: none; transition: all 0.15s; }
.btn:active { transform: scale(0.97); }
.btn-primary { background: var(--accent); color: #0f172a; }
.btn-green { background: var(--green); color: #0f172a; }
.btn-red { background: var(--red); color: #fff; }
.btn-ghost { background: var(--surface2); color: var(--text); }
.btn-full { width: 100%; }
.btn-sm { padding: 6px 12px; font-size: 0.8rem; }
.roster-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
.player-chip { border-radius: 8px; padding: 10px 8px; text-align: center; font-size: 0.82rem; font-weight: 600; cursor: pointer; border: 2px solid transparent; transition: all 0.15s; position: relative; }
.player-chip.male { background: rgba(59,130,246,0.2); border-color: #3b82f6; color: #93c5fd; }
.player-chip.female { background: rgba(236,72,153,0.2); border-color: #ec4899; color: #f9a8d4; }
.player-chip.selected { outline: 3px solid var(--amber); outline-offset: 2px; }
.player-chip .jersey { font-size: 1.1rem; font-weight: 700; }
.player-chip .name { font-size: 0.72rem; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.demo-tabs { display: flex; background: var(--surface); border-bottom: 1px solid var(--border); overflow-x: auto; position: sticky; top: 0; z-index: 10; }
.demo-tab { padding: 10px 14px; font-size: 0.8rem; font-weight: 600; cursor: pointer; border-bottom: 2px solid transparent; color: var(--muted); white-space: nowrap; }
.demo-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.sub-tabs { display: flex; gap: 4px; margin-bottom: 14px; background: var(--surface2); border-radius: 8px; padding: 3px; }
.sub-tab { flex: 1; padding: 7px 8px; text-align: center; font-size: 0.78rem; font-weight: 600; cursor: pointer; border-radius: 6px; color: var(--muted); }
.sub-tab.active { background: var(--surface); color: var(--text); }
.toggle-group { display: flex; background: var(--surface2); border-radius: 8px; padding: 3px; gap: 3px; }
.toggle-btn { flex: 1; padding: 7px; border-radius: 6px; border: none; background: transparent; color: var(--muted); font-size: 0.82rem; font-weight: 600; cursor: pointer; }
.toggle-btn.active { background: var(--surface); color: var(--text); }
.scoreboard { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 16px; display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
.score-num { font-size: 2.8rem; font-weight: 800; }
.score-num.us { color: var(--green); }
.score-num.them { color: var(--red); }
.gender-dot { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; font-weight: 700; }
.gender-dot.M { background: rgba(59,130,246,0.3); color: #93c5fd; border: 1px solid #3b82f6; }
.gender-dot.F { background: rgba(236,72,153,0.3); color: #f9a8d4; border: 1px solid #ec4899; }
.action-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-top: 10px; }
.game-log-list { list-style: none; font-size: 0.82rem; }
.game-log-list li { padding: 8px 0; border-bottom: 1px solid var(--border); }
</style>
</head>
<body>

<nav><div class="logo">🥏 Ultimate Tracker</div></nav>

<div class="demo-tabs">
    <div class="demo-tab active" onclick="showScreen('roster')">Roster</div>
    <div class="demo-tab" onclick="showScreen('lines')">Squad</div>
    <div class="demo-tab" onclick="showScreen('setup')">Setup</div>
    <div class="demo-tab" onclick="showScreen('calling')">Line Calling</div>
    <div class="demo-tab" onclick="showScreen('live')">Live</div>
    <div class="demo-tab" onclick="showScreen('summary')">Summary</div>
</div>

<div class="screen active" id="screen-roster">
    <div class="card">
        <div class="card-title">Choose the players for the game</div>
        <button class="btn btn-ghost btn-sm mb-12" onclick="addAllToSquad()">+ Add All</button>
        <div class="roster-grid" id="roster-selection-grid"></div>
    </div>
</div>

<div class="screen" id="screen-lines">
    <div class="card">
        <div class="card-title">Game Squad</div>
        <div class="roster-grid" id="game-squad-grid"></div>
    </div>
</div>

<div class="screen" id="screen-setup">
    <div class="card">
        <div class="card-title">Opponent Name</div>
        <input class="input" type="text" id="opp-name-setup" style="width:100%; padding:8px; border-radius:8px; background:var(--surface2); color:white; border:1px solid var(--border);" value="Hurricanes" />
    </div>
    <div class="card">
        <div class="card-title">ABBA Sequence Start</div>
        <div class="toggle-group">
            <button class="toggle-btn active" id="abba-m" onclick="setAbba('M')">Male First (4M3F)</button>
            <button class="toggle-btn" id="abba-f" onclick="setAbba('F')">Female First (3M4F)</button>
        </div>
    </div>
    <button class="btn btn-green btn-full" onclick="showScreen('calling')">Initialize Lines →</button>
</div>

<div class="screen" id="screen-calling">
    <div class="card">
        <div class="card-title">Current Line (Point <span id="call-pt-now">1</span>)</div>
        <div id="calling-line-0" class="roster-grid"></div>
    </div>
    <div class="card">
        <div class="card-title">Next Line (Point <span id="call-pt-next">2</span>)</div>
        <div id="calling-line-1" class="roster-grid"></div>
    </div>
    <button class="btn btn-primary btn-full" onclick="showScreen('live')">Go to Live Game</button>
</div>

<div class="screen" id="screen-live">
    <div class="scoreboard">
        <div style="text-align:center"><div class="score-num us" id="live-us">0</div><div>FireDiscs</div></div>
        <div style="text-align:center">Point <span id="live-pt">1</span><br><small id="live-req"></small></div>
        <div style="text-align:center"><div class="score-num them" id="live-them">0</div><div id="live-opp-name">Hurricanes</div></div>
    </div>
    
    <div class="sub-tabs">
        <div class="sub-tab active" id="tab-action" onclick="showLiveSub('action')">Action</div>
        <div class="sub-tab" id="tab-log" onclick="showLiveSub('log')">Log</div>
    </div>

    <div id="live-action">
        <div class="card">
            <div class="card-title" id="action-prompt">Select Player Action</div>
            <div class="roster-grid" id="live-players-grid"></div>
            <div id="action-options" style="display:none;" class="action-grid">
                <button class="btn btn-ghost" onclick="recordStat('D')">D</button>
                <button class="btn btn-red" onclick="recordStat('Turnover')">Turn</button>
                <button class="btn btn-green" onclick="recordStat('Score')">Score</button>
            </div>
            <div id="assist-options" style="display:none;">
                <div class="card-title">Who Assisted?</div>
                <div class="roster-grid" id="assist-grid"></div>
            </div>
        </div>
        <button class="btn btn-red btn-full" onclick="theyScore()">+1 Them (Opponent Scored)</button>
    </div>

    <div id="live-log" style="display:none;">
        <div class="card"><ul class="game-log-list" id="game-log-ui"></ul></div>
    </div>
</div>

<div class="screen" id="screen-summary">
    <div class="card">
        <div class="card-title">Final Stats</div>
        <div id="summary-content"></div>
    </div>
    <button class="btn btn-ghost btn-full" onclick="location.reload()">New Game</button>
</div>

<script>
let roster = [
    {id:1, name:'Alex', num:7, gender:'M'}, {id:2, name:'Jordan', num:11, gender:'F'},
    {id:3, name:'Sam', num:4, gender:'M'}, {id:4, name:'Casey', num:9, gender:'F'},
    {id:5, name:'Morgan', num:22, gender:'M'}, {id:6, name:'Taylor', num:15, gender:'F'},
    {id:7, name:'Riley', num:3, gender:'M'}, {id:8, name:'Quinn', num:8, gender:'F'},
    {id:9, name:'Drew', num:17, gender:'M'}, {id:10, name:'Blake', num:6, gender:'F'}
];

let squad = [];
let scoreUs = 0, scoreThem = 0, curPoint = 1;
let abbaStart = 'M';
let plannedLines = [[], [], []]; // Current, Next, Next+1
let activePlayerId = null;
let gameLog = [];

function showScreen(name) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('.demo-tab').forEach(t => t.classList.remove('active'));
    document.getElementById('screen-' + name).classList.add('active');
    if(name === 'live') renderLive();
    if(name === 'calling') renderCalling();
    if(name === 'summary') renderSummary();
}

// ROSTER LOGIC
function renderRoster() {
    const grid = document.getElementById('roster-selection-grid');
    grid.innerHTML = '';
    roster.forEach(p => {
        const inSq = squad.includes(p.id);
        const chip = document.createElement('div');
        chip.className = `player-chip ${p.gender === 'M' ? 'male' : 'female'} ${inSq ? 'selected' : ''}`;
        chip.innerHTML = `<div class="jersey">#${p.num}</div><div class="name">${p.name}</div>`;
        chip.onclick = () => {
            if(inSq) squad = squad.filter(id => id !== p.id);
            else squad.push(p.id);
            renderRoster();
            renderSquad();
        };
        grid.appendChild(chip);
    });
}

function addAllToSquad() {
    squad = roster.map(p => p.id);
    renderRoster();
    renderSquad();
}

function renderSquad() {
    const grid = document.getElementById('game-squad-grid');
    grid.innerHTML = '';
    squad.forEach(id => {
        const p = roster.find(x => x.id === id);
        const chip = document.createElement('div');
        chip.className = `player-chip ${p.gender === 'M' ? 'male' : 'female'}`;
        chip.innerHTML = `<div class="jersey">#${p.num}</div><div class="name">${p.name}</div>`;
        grid.appendChild(chip);
    });
}

// SETUP & CALLING
function setAbba(g) {
    abbaStart = g;
    document.getElementById('abba-m').classList.toggle('active', g === 'M');
    document.getElementById('abba-f').classList.toggle('active', g === 'F');
}

function renderCalling() {
    document.getElementById('call-pt-now').textContent = curPoint;
    document.getElementById('call-pt-next').textContent = curPoint + 1;
    [0, 1].forEach(offset => {
        const grid = document.getElementById('calling-line-' + offset);
        grid.innerHTML = '';
        squad.forEach(id => {
            const p = roster.find(x => x.id === id);
            const inLine = plannedLines[offset].includes(id);
            const chip = document.createElement('div');
            chip.className = `player-chip ${p.gender === 'M' ? 'male' : 'female'} ${inLine ? 'selected' : ''}`;
            chip.innerHTML = `<div class="jersey">#${p.num}</div><div class="name">${p.name}</div>`;
            chip.onclick = () => {
                if(inLine) plannedLines[offset] = plannedLines[offset].filter(x => x !== id);
                else if(plannedLines[offset].length < 7) plannedLines[offset].push(id);
                renderCalling();
            };
            grid.appendChild(chip);
        });
    });
}

// LIVE ACTION
function showLiveSub(tab) {
    document.getElementById('live-action').style.display = tab === 'action' ? 'block' : 'none';
    document.getElementById('live-log').style.display = tab === 'log' ? 'block' : 'none';
    document.getElementById('tab-action').classList.toggle('active', tab === 'action');
    document.getElementById('tab-log').classList.toggle('active', tab === 'log');
}

function renderLive() {
    document.getElementById('live-us').textContent = scoreUs;
    document.getElementById('live-them').textContent = scoreThem;
    document.getElementById('live-pt').textContent = curPoint;
    document.getElementById('live-opp-name').textContent = document.getElementById('opp-name-setup').value;
    
    const grid = document.getElementById('live-players-grid');
    grid.innerHTML = '';
    plannedLines[0].forEach(id => {
        const p = roster.find(x => x.id === id);
        const chip = document.createElement('div');
        chip.className = `player-chip ${p.gender === 'M' ? 'male' : 'female'} ${activePlayerId === id ? 'selected' : ''}`;
        chip.innerHTML = `<div class="jersey">#${p.num}</div><div class="name">${p.name}</div>`;
        chip.onclick = () => {
            activePlayerId = id;
            document.getElementById('action-options').style.display = 'grid';
            document.getElementById('assist-options').style.display = 'none';
            renderLive();
        };
        grid.appendChild(chip);
    });
}

function recordStat(type) {
    const p = roster.find(x => x.id === activePlayerId);
    if(type === 'Score') {
        document.getElementById('action-options').style.display = 'none';
        document.getElementById('assist-options').style.display = 'block';
        const agrid = document.getElementById('assist-grid');
        agrid.innerHTML = '';
        plannedLines[0].filter(id => id !== activePlayerId).forEach(id => {
            const assistant = roster.find(x => x.id === id);
            const chip = document.createElement('div');
            chip.className = `player-chip ${assistant.gender === 'M' ? 'male' : 'female'}`;
            chip.innerHTML = `<div class="name">${assistant.name}</div>`;
            chip.onclick = () => finalizePoint(p.name, assistant.name);
            agrid.appendChild(chip);
        });
    } else {
        gameLog.push(`Point ${curPoint}: ${p.name} recorded a ${type}`);
        updateLog();
        activePlayerId = null;
        document.getElementById('action-options').style.display = 'none';
        renderLive();
    }
}

function finalizePoint(scorer, assistant) {
    scoreUs++;
    gameLog.push(`Point ${curPoint}: Goal by ${scorer}, Assist by ${assistant}`);
    nextPoint();
}

function theyScore() {
    scoreThem++;
    gameLog.push(`Point ${curPoint}: Opponent Scored`);
    nextPoint();
}

function nextPoint() {
    curPoint++;
    plannedLines.shift(); // Push lines up
    plannedLines.push([]); // Add empty placeholder for future
    activePlayerId = null;
    document.getElementById('action-options').style.display = 'none';
    document.getElementById('assist-options').style.display = 'none';
    updateLog();
    if(plannedLines[0].length === 0) showScreen('calling');
    else renderLive();
}

function updateLog() {
    const ui = document.getElementById('game-log-ui');
    ui.innerHTML = gameLog.slice().reverse().map(l => `<li>${l}</li>`).join('');
}

function renderSummary() {
    document.getElementById('summary-content').innerHTML = `
        <h3>Final Score: ${scoreUs} - ${scoreThem}</h3>
        <p>Total Points Played: ${curPoint - 1}</p>
        <hr style="margin:10px 0; opacity:0.2;">
        <h4>Log:</h4>
        <ul style="font-size:0.8rem; margin-top:10px;">${gameLog.map(l => `<li>${l}</li>`).join('')}</ul>
    `;
}

// Init
renderRoster();
</script>
</body>
</html>
